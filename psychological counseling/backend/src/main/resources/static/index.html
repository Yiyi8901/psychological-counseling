<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心语 · 心理陪伴助手</title>

    <!-- Vue 3 Global Build -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <!-- Axios -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

    <style>
        /* ===== CSS Reset ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Helvetica, sans-serif;
            font-size: 14px;
            color: #333;
            background: #ffffff;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        button { border: none; outline: none; cursor: pointer; font-family: inherit; }
        input { border: none; outline: none; font-family: inherit; }

        /* ===== App 容器 ===== */
        #app {
            width: 85vw;
            max-width: 1000px;
            height: 75vh;
            min-height: 500px;
            margin: 0 auto;
            background: #fff;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            border-radius: 16px;
            border: 1px solid #eee;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08), 0 1px 3px rgba(0, 0, 0, 0.04);
        }

        /* ===== 登录页 ===== */
        .login-page {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 30px;
            background: #fff;
        }
        .login-page h1 {
            text-align: center;
            color: #5b8cff;
            margin-bottom: 8px;
            font-size: 24px;
        }
        .login-subtitle {
            text-align: center;
            color: #999;
            font-size: 13px;
            margin-bottom: 30px;
        }
        .login-page input {
            width: 100%;
            height: 44px;
            background: #f5f5f5;
            border-radius: 8px;
            padding: 0 14px;
            margin-bottom: 14px;
            font-size: 15px;
        }
        .login-page button {
            width: 100%;
            height: 46px;
            background: #5b8cff;
            color: #fff;
            border-radius: 8px;
            font-size: 16px;
            margin-top: 6px;
        }
        .login-page button:disabled {
            background: #b0c8ff;
        }
        .login-tip {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 18px;
        }

        /* ===== 聊天页 ===== */
        .chat-page {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            background: #ffffff;
            color: #333;
            font-size: 17px;
            font-weight: 500;
            flex-shrink: 0;
            border-bottom: 1px solid #eee;
        }
        .chat-header .icon-btn {
            color: #5b8cff;
            background: transparent;
            font-size: 13px;
            padding: 6px 8px;
            opacity: 0.9;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .chat-header .title {
            flex: 1;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px 24px;
            background-image: url('my-bg.jpg');
            background-size: 100% auto;
            background-position: top center;
            background-repeat: no-repeat;
            -webkit-overflow-scrolling: touch;
        }
        .msg {
            display: flex;
            margin-bottom: 16px;
            max-width: 100%;
            align-items: flex-start;
        }
        .msg.user {
            justify-content: flex-end;
        }
        .msg.ai {
            justify-content: flex-start;
        }

        /* ===== 头像 ===== */
        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            line-height: 1;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
        }
        .avatar.ai {
            background: linear-gradient(135deg, #dbe7ff, #e8f0ff);
            margin-right: 8px;
        }
        .avatar.user {
            background: linear-gradient(135deg, #d9f5d9, #eaf7ea);
            margin-left: 8px;
        }

        .bubble {
            max-width: 60%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.6;
            word-break: break-word;
            font-size: 15px;
            white-space: pre-wrap;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }
        .msg.user .bubble {
            background: #1aad19;
            color: #fff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 2px 8px rgba(26, 173, 25, 0.20);
        }
        .msg.ai .bubble {
            background: #f5f5f5;
            color: #333;
            border: 1px solid #e5e5e5;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        /* 危机干预文案高亮 */
        .msg.ai .bubble.crisis {
            background: #fff4e6;
            border-color: #ffb84d;
            color: #cc6600;
            font-weight: 500;
        }

        /* ===== AI 正在输入动画 ===== */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 0;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #bbb;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        /* ===== 空对话提示 ===== */
        .empty-hint {
            text-align: center;
            color: #aaa;
            font-size: 13px;
            margin-top: 60px;
            padding: 0 30px;
            line-height: 1.8;
        }

        /* ===== 底部输入条 ===== */
        .input-bar {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            padding: 8px 10px;
            background: #fff;
            border-top: 1px solid #eee;
            padding-bottom: calc(8px + env(safe-area-inset-bottom, 0));
        }
        .input-bar input {
            flex: 1;
            height: 42px;
            background: #f0ebe1;
            border-radius: 24px;
            padding: 0 18px;
            font-size: 15px;
        }
        .input-bar button {
            margin-left: 8px;
            height: 42px;
            padding: 0 22px;
            background: #5b8cff;
            color: #fff;
            border-radius: 24px;
            font-size: 15px;
            box-shadow: 0 2px 8px rgba(91, 140, 255, 0.30);
        }
        .input-bar button:disabled {
            background: #b0c8ff;
        }

        /* ===== 会话侧边栏（抽屉） ===== */
        .drawer-mask {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
        }
        .drawer-mask.open {
            opacity: 1;
            pointer-events: auto;
        }
        .drawer {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: 78%;
            max-width: 440px;
            background: #fff;
            z-index: 101;
            transform: translateX(-100%);
            transition: transform 0.25s;
            display: flex;
            flex-direction: column;
        }
        .drawer.open {
            transform: translateX(0);
        }
        .drawer-header {
            padding: 20px 16px 12px;
            background: #5b8cff;
            color: #fff;
            flex-shrink: 0;
        }
        .drawer-header .title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 14px;
        }
        .new-chat-btn {
            width: 100%;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 8px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .new-chat-btn:active {
            background: rgba(255, 255, 255, 0.3);
        }
        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        .session-item {
            padding: 12px 16px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .session-item:active {
            background: #f5f5f5;
        }
        .session-item.active {
            background: #eef3ff;
            border-left: 3px solid #5b8cff;
            padding-left: 13px;
        }
        .session-item .session-title {
            font-size: 14px;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .session-item .session-meta {
            font-size: 11px;
            color: #999;
            display: flex;
            justify-content: space-between;
        }
        .session-empty {
            text-align: center;
            color: #bbb;
            font-size: 13px;
            padding: 40px 20px;
            line-height: 1.6;
        }

        /* ===== 菜单图标（纯 CSS） ===== */
        .menu-icon {
            display: inline-block;
            width: 18px;
            height: 14px;
            position: relative;
        }
        .menu-icon::before,
        .menu-icon::after,
        .menu-icon span {
            content: '';
            position: absolute;
            left: 0;
            width: 100%;
            height: 2px;
            background: #5b8cff;
            border-radius: 1px;
        }
        .menu-icon::before { top: 0; }
        .menu-icon span { top: 6px; }
        .menu-icon::after { bottom: 0; }

        /* ===== 响应式适配：小屏幕恢复手机竖屏布局 ===== */
        @media (max-width: 640px) {
            #app {
                width: 100%;
                max-width: 100%;
                height: 100vh;
                min-height: 100vh;
                border-radius: 0;
                box-shadow: none;
            }
            .chat-body {
                padding: 16px 12px;
            }
            .drawer {
                max-width: 320px;
            }
        }
    </style>
</head>
<body>

<div id="app">

    <!-- 登录页 -->
    <div class="login-page" v-if="currentPage === 'login'">
        <h1>心语</h1>
        <div class="login-subtitle">你的心理陪伴助手</div>
        <input v-model="username" type="text" placeholder="请输入用户名" />
        <input v-model="password" type="password" placeholder="请输入密码" />
        <button @click="handleLogin" :disabled="!username || !password">登录</button>
        <div class="login-tip">登录后开始与心语对话</div>
    </div>

    <!-- 聊天页 -->
    <div class="chat-page" v-else-if="currentPage === 'chat'">
        <div class="chat-header">
            <button class="icon-btn" @click="openDrawer">
                <span class="menu-icon"><span></span></span>
            </button>
            <div class="title">{{ currentSessionTitle || '心语' }}</div>
            <button class="icon-btn" @click="logout">退出</button>
        </div>

        <!-- 消息列表 -->
        <div class="chat-body" ref="chatBody">
            <div v-if="messages.length === 0" class="empty-hint">
                你好，我是心语<br>
                有什么想聊的吗？无论是开心的事还是烦心事，都可以跟我说
            </div>

            <div
                v-for="(msg, idx) in messages"
                :key="idx"
                class="msg"
                :class="msg.role"
            >
                <div v-if="msg.role === 'ai'" class="avatar ai">🌿</div>
                <div class="bubble" :class="{ crisis: msg.crisis }">{{ msg.content }}</div>
                <div v-if="msg.role === 'user'" class="avatar user">🧑</div>
            </div>

            <!-- AI 正在思考的 typing 动画（仅在收到第一个 chunk 之前显示） -->
            <div v-if="isWaiting && !streamingContent" class="msg ai">
                <div class="avatar ai">🌿</div>
                <div class="bubble typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>

        <!-- 底部输入条 -->
        <div class="input-bar">
            <input
                v-model="inputContent"
                @keyup.enter="sendMessage"
                placeholder="说说你的感受..."
                :disabled="isWaiting"
            />
            <button @click="sendMessage" :disabled="!inputContent.trim() || isWaiting">
                {{ isWaiting ? '思考中' : '发送' }}
            </button>
        </div>
    </div>

    <!-- 会话侧边栏（抽屉） -->
    <div class="drawer-mask" :class="{ open: drawerOpen }" @click="closeDrawer"></div>
    <div class="drawer" :class="{ open: drawerOpen }" v-if="currentPage === 'chat'">
        <div class="drawer-header">
            <div class="title">我的对话</div>
            <button class="new-chat-btn" @click="newConversation">+ 开始新对话</button>
        </div>
        <div class="session-list">
            <div v-if="sessions.length === 0" class="session-empty">
                还没有对话记录<br>点击上方按钮开始新的对话
            </div>
            <div
                v-for="s in sessions"
                :key="s.session_id"
                class="session-item"
                :class="{ active: s.session_id === currentSessionId }"
                @click="switchSession(s.session_id, s.title)"
            >
                <div class="session-title">{{ s.title || '新的对话' }}</div>
                <div class="session-meta">
                    <span>{{ s.msg_count }} 条消息</span>
                    <span>{{ formatTime(s.last_time) }}</span>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
    const { createApp, ref, nextTick, onMounted } = Vue;

    const API_BASE = 'http://localhost:8080/api';

    // Axios 全局 401 拦截：Token 失效自动跳登录
    axios.interceptors.response.use(
        res => res,
        err => {
            if (err.response && err.response.status === 401) {
                clearAuthAndRedirect();
            }
            return Promise.reject(err);
        }
    );

    function clearAuthAndRedirect() {
        localStorage.removeItem('token');
        localStorage.removeItem('userId');
        location.reload();
    }

    createApp({
        setup() {
            // ===== 登录相关 =====
            const currentPage = ref('login');
            const username = ref('');
            const password = ref('');
            const token = ref(localStorage.getItem('token') || '');
            const userId = ref(localStorage.getItem('userId') || null);

            // ===== 聊天相关 =====
            const messages = ref([]);
            const inputContent = ref('');
            const chatBody = ref(null);
            const isWaiting = ref(false);
            const streamingContent = ref('');  // 当前流式累积的内容

            // ===== 会话相关 =====
            const drawerOpen = ref(false);
            const sessions = ref([]);
            const currentSessionId = ref(localStorage.getItem('currentSessionId') || '');
            const currentSessionTitle = ref('');

            // ================================================================
            //  工具方法
            // ================================================================

            function authHeaders() {
                return { 'Authorization': 'Bearer ' + token.value };
            }

            function scrollToBottom() {
                nextTick(() => {
                    if (chatBody.value) {
                        chatBody.value.scrollTop = chatBody.value.scrollHeight;
                    }
                });
            }

            function formatTime(t) {
                if (!t) return '';
                // 后端返回的是 LocalDateTime 序列化字符串，取前 10 位日期
                return String(t).substring(0, 10);
            }

            // 生成会话 ID（UUID）
            function genSessionId() {
                if (window.crypto && crypto.randomUUID) {
                    return crypto.randomUUID();
                }
                return 'sess-' + Date.now() + '-' + Math.random().toString(36).slice(2, 10);
            }

            // ================================================================
            //  会话管理
            // ================================================================

            async function loadSessions() {
                try {
                    const { data } = await axios.get(`${API_BASE}/sessions`, {
                        headers: authHeaders()
                    });
                    sessions.value = data.sessions || [];
                } catch (e) {
                    console.error('加载会话列表失败', e);
                }
            }

            function openDrawer() {
                drawerOpen.value = true;
                loadSessions();
            }

            function closeDrawer() {
                drawerOpen.value = false;
            }

            function newConversation() {
                currentSessionId.value = genSessionId();
                currentSessionTitle.value = '新的对话';
                localStorage.setItem('currentSessionId', currentSessionId.value);
                messages.value = [];
                closeDrawer();
            }

            async function switchSession(sid, title) {
                currentSessionId.value = sid;
                currentSessionTitle.value = title || '对话';
                localStorage.setItem('currentSessionId', sid);
                closeDrawer();
                await loadHistory(sid);
            }

            // ================================================================
            //  历史消息加载
            // ================================================================

            async function loadHistory(sid) {
                if (!sid) return;
                try {
                    const { data } = await axios.get(`${API_BASE}/history`, {
                        params: { sessionId: sid, limit: 30 },
                        headers: authHeaders()
                    });
                    messages.value = (data.messages || []).map(m => ({
                        role: m.role === 'assistant' ? 'ai' : m.role,
                        content: m.content,
                        crisis: false
                    }));
                    scrollToBottom();
                } catch (e) {
                    console.error('加载历史失败', e);
                    if (e.response && e.response.status === 401) return;
                    messages.value = [];
                }
            }

            // ================================================================
            //  登录
            // ================================================================

            async function handleLogin() {
                if (!username.value || !password.value) {
                    alert('请输入用户名和密码');
                    return;
                }
                try {
                    const { data } = await axios.post(`${API_BASE}/login`, {
                        username: username.value,
                        password: password.value
                    });
                    token.value = data.token;
                    userId.value = data.userId;
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userId', data.userId);
                    currentPage.value = 'chat';
                    // 没有 currentSessionId 则新建一个
                    if (!currentSessionId.value) {
                        currentSessionId.value = genSessionId();
                        localStorage.setItem('currentSessionId', currentSessionId.value);
                    }
                    await loadSessions();
                    // 如果有历史会话，切到最近的一个；否则保持新建
                    if (sessions.value.length > 0) {
                        const latest = sessions.value[0];
                        await switchSession(latest.session_id, latest.title);
                    } else {
                        messages.value = [];
                    }
                } catch (e) {
                    alert(e.response?.data?.message || e.message || '登录失败');
                }
            }

            // ================================================================
            //  发送消息（SSE 流式）
            // ================================================================

            async function sendMessage() {
                const content = inputContent.value.trim();
                if (!content || isWaiting.value) return;

                // 确保有 sessionId
                if (!currentSessionId.value) {
                    currentSessionId.value = genSessionId();
                    localStorage.setItem('currentSessionId', currentSessionId.value);
                }

                // 1. 用户消息立即上屏
                messages.value.push({ role: 'user', content: content, crisis: false });
                inputContent.value = '';
                isWaiting.value = true;
                streamingContent.value = '';
                scrollToBottom();

                // 2. 调用 SSE 流式接口
                try {
                    const resp = await fetch(`${API_BASE}/chat/stream`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + token.value
                        },
                        body: JSON.stringify({
                            sessionId: currentSessionId.value,
                            message: content
                        })
                    });

                    if (resp.status === 401) {
                        clearAuthAndRedirect();
                        return;
                    }
                    if (!resp.ok) {
                        const errText = await resp.text();
                        messages.value.push({
                            role: 'ai',
                            content: '出错了：' + errText,
                            crisis: false
                        });
                        return;
                    }

                    // 3. 用 ReadableStream 逐 chunk 读取 SSE
                    const reader = resp.body.getReader();
                    const decoder = new TextDecoder('utf-8');
                    let buffer = '';
                    let aiMsg = { role: 'ai', content: '', crisis: false };
                    messages.value.push(aiMsg);

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        buffer += decoder.decode(value, { stream: true });

                        // 按 SSE 事件分隔（空行）
                        let parts = buffer.split('\n\n');
                        buffer = parts.pop();  // 最后一部分可能不完整，留到下次

                        for (let part of parts) {
                            let chunk = '';
                            // 一个事件可能有多行 data:
                            for (let line of part.split('\n')) {
                                if (line.startsWith('data:')) {
                                    chunk += line.substring(5);
                                }
                            }
                            if (!chunk) continue;

                            // 后端最终会发 [DONE] 标记
                            if (chunk === '[DONE]') continue;

                            aiMsg.content += chunk;
                            streamingContent.value = aiMsg.content;
                            scrollToBottom();
                        }
                    }

                    // 危机干预文案特殊高亮
                    if (aiMsg.content.includes('400-161-9995')) {
                        aiMsg.crisis = true;
                    }

                    // 第一条消息后，刷新会话列表（让新会话出现在侧边栏）
                    loadSessions();

                } catch (e) {
                    // 流式中断或网络异常
                    if (streamingContent.value) {
                        messages.value.push({
                            role: 'ai',
                            content: '（连接中断，已显示部分回复）',
                            crisis: false
                        });
                    } else {
                        messages.value.push({
                            role: 'ai',
                            content: '出错了：' + (e.message || '网络异常'),
                            crisis: false
                        });
                    }
                } finally {
                    isWaiting.value = false;
                    streamingContent.value = '';
                    scrollToBottom();
                }
            }

            // ================================================================
            //  退出登录
            // ================================================================

            function logout() {
                if (!confirm('确定要退出登录吗？')) return;
                localStorage.removeItem('token');
                localStorage.removeItem('userId');
                localStorage.removeItem('currentSessionId');
                token.value = '';
                userId.value = '';
                currentSessionId.value = '';
                messages.value = [];
                sessions.value = [];
                inputContent.value = '';
                isWaiting.value = false;
                currentPage.value = 'login';
                username.value = '';
                password.value = '';
            }

            // ================================================================
            //  启动
            // ================================================================

            onMounted(async () => {
                if (token.value && userId.value) {
                    currentPage.value = 'chat';
                    await loadSessions();
                    if (currentSessionId.value) {
                        // 已有 currentSessionId，尝试加载其历史
                        await loadHistory(currentSessionId.value);
                        // 同步标题
                        const found = sessions.value.find(s => s.session_id === currentSessionId.value);
                        if (found) currentSessionTitle.value = found.title || '对话';
                    } else if (sessions.value.length > 0) {
                        const latest = sessions.value[0];
                        await switchSession(latest.session_id, latest.title);
                    } else {
                        currentSessionId.value = genSessionId();
                        localStorage.setItem('currentSessionId', currentSessionId.value);
                    }
                }
            });

            return {
                // 数据
                currentPage, username, password, token,
                messages, inputContent, chatBody, isWaiting, streamingContent,
                drawerOpen, sessions, currentSessionId, currentSessionTitle,
                // 方法
                handleLogin, sendMessage, logout,
                openDrawer, closeDrawer, newConversation, switchSession,
                formatTime
            };
        }
    }).mount('#app');
</script>

</body>
</html>
